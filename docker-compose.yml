version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. Base de Datos (PostgreSQL)
  # Cumple con: "Uso de una base de datos" [cite: 19]
  # -----------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: bloxtek_db
    restart: always
    environment:
      [cite_start]POSTGRES_USER: ${DB_USER:-postgres}       # Uso de variables de entorno 
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-bloxtek_db}
    ports:
      - "5432:5432" # Expuesto para que puedas inspeccionar la BD desde tu host (TablePlus, DBeaver)
    volumes:
      - pg_data:/var/lib/postgresql/data # Persistencia de datos
    networks:
      - bloxtek-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 2. Backend (NestJS)
  # Cumple con: "Backend debe utilizar NestJS" y "Dockerización" [cite: 18, 22]
  # -----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloxtek_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # Espera a que la BD esté lista antes de iniciar
    ports:
      - "${BACKEND_PORT:-3000}:3000" # Mapea el puerto del contenedor al host
    environment:
      # Node
      NODE_ENV: production
      PORT: 3000
      
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-bloxtek_db}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-secreto_super_seguro}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      
      # Security
      PASSWORD_SALT_ROUNDS: ${PASSWORD_SALT_ROUNDS:-10}
      
      # Seeding
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bloxtek.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234*!}
    networks:
      - bloxtek-network

  # -----------------------------------------------------------------
  # 3. Frontend (Next.js)
  # Cumple con: "Frontend debe estar construido con Next.js" y "Dockerización" [cite: 17, 22]
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloxtek_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      # URL interna para SSR (Server Side Rendering)
      API_URL_INTERNAL: http://backend:3000
      # URL pública para el navegador (Client Side)
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3000}
    networks:
      - bloxtek-network

volumes:
  pg_data:

networks:
  bloxtek-network:
    driver: bridge